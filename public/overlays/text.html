<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Text Callout</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: #00b140;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { position: fixed; left: 80px; bottom: 100px; }
  .pill {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 16px 28px;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(10px);
    border-radius: 999px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    transform: translateY(30px) scale(0.96); opacity: 0;
    will-change: transform, opacity;
    margin-bottom: 14px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #2ED195; box-shadow: 0 0 12px #2ED195; }
  .pill-text { font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.85); letter-spacing: 0.04em; text-transform: uppercase; }
  .headline {
    max-width: 1000px;
    font-size: 56px; font-weight: 700; line-height: 1.15;
    color: #fff; letter-spacing: -0.025em;
    text-shadow: 0 2px 24px rgba(0,0,0,0.5);
  }
  .headline .w { display: inline-block; opacity: 0; transform: translateY(18px); }
</style>
</head>
<body>
<div class="wrap">
  <div class="pill" id="pill">
    <div class="dot"></div>
    <div class="pill-text" id="pillText">WICHTIG</div>
  </div>
  <div class="headline" id="headline"></div>
</div>

<script>
  const params = {
    pill: 'WICHTIG',
    headline: 'Nur unter einem Euro Strom im Monat.',
  };
  const qs = new URLSearchParams(location.search);
  for (const k of Object.keys(params)) if (qs.has(k)) params[k] = qs.get(k);

  function build() {
    document.getElementById('pillText').textContent = params.pill;
    const h = document.getElementById('headline');
    h.innerHTML = '';
    const words = params.headline.split(/(\s+)/);
    words.forEach(w => {
      if (/^\s+$/.test(w)) h.appendChild(document.createTextNode(w));
      else {
        const s = document.createElement('span'); s.className = 'w'; s.textContent = w; h.appendChild(s);
      }
    });
  }
  build();

  window.setParams = function(p) {
    Object.assign(params, p);
    build();
    if (window.__lastFrame !== undefined) window.seekTo(window.__lastFrame, window.__lastFps);
  };

  const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const lerp = (a, b, t) => a + (b - a) * t;

  window.seekTo = function(frame, fps) {
    window.__lastFrame = frame; window.__lastFps = fps;
    const total = 5.5;
    const t = (frame / fps) % total;

    // Pill in/out
    let pT = 30, pS = 0.96, pOp = 0;
    if (t < 0.5) {
      const p = clamp(t / 0.5, 0, 1);
      const e = easeOutCubic(p);
      pT = lerp(30, 0, e); pS = lerp(0.96, 1, e); pOp = e;
    } else if (t < 4.3) {
      pT = 0; pS = 1; pOp = 1;
    } else if (t < 4.9) {
      const p = clamp((t - 4.3) / 0.6, 0, 1);
      pT = lerp(0, 30, p); pS = 1; pOp = 1 - p;
    } else { pT = 30; pS = 1; pOp = 0; }
    const pill = document.getElementById('pill');
    pill.style.transform = `translateY(${pT}px) scale(${pS})`;
    pill.style.opacity = pOp;

    // Words
    const words = document.querySelectorAll('.headline .w');
    const start = 0.4, stagger = 0.05, dur = 0.5;
    words.forEach((el, i) => {
      let wp = clamp((t - start - i * stagger) / dur, 0, 1);
      // Also fade out toward exit
      let exitP = 0;
      if (t > 4.3) exitP = clamp((t - 4.3) / 0.6, 0, 1);
      const we = easeOutCubic(wp) * (1 - exitP);
      el.style.opacity = we;
      el.style.transform = `translateY(${lerp(18, 0, easeOutCubic(wp))}px)`;
    });
  };

  window.seekTo(0, 30);
</script>
</body>
</html>
