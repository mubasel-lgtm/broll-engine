<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Stat Overlay</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: #00b140;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { position: fixed; left: 80px; bottom: 100px; }
  .bar {
    display: flex; align-items: stretch;
    background: rgba(0,0,0,0.82);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    transform: translateY(40px); opacity: 0;
    will-change: transform, opacity;
  }
  .num-box {
    position: relative; width: 200px; padding: 28px 24px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1D9E75 0%, #0F6E56 100%);
    overflow: hidden;
  }
  .num { font-size: 64px; font-weight: 700; color: #fff; letter-spacing: -0.03em; line-height: 1; font-variant-numeric: tabular-nums; }
  .shimmer {
    position: absolute; top: 0; bottom: 0; width: 40%;
    left: -40%;
    background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
    transform: skewX(-20deg);
    pointer-events: none;
  }
  .text {
    padding: 28px 32px; display: flex; flex-direction: column; justify-content: center; gap: 6px;
    max-width: 560px;
  }
  .line1 { font-size: 22px; font-weight: 500; color: #fff; transform: translateX(-12px); opacity: 0; }
  .line2 { font-size: 15px; color: rgba(255,255,255,0.5); transform: translateX(-12px); opacity: 0; }
  .accent {
    margin-top: 10px; height: 3px; width: 0%;
    background: linear-gradient(90deg, #1D9E75, #2ED195);
    border-radius: 2px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="bar" id="bar">
    <div class="num-box">
      <div class="num" id="num">0%</div>
      <div class="shimmer" id="shimmer"></div>
    </div>
    <div class="text">
      <div class="line1" id="line1">der Tierärzte empfehlen</div>
      <div class="line2" id="line2">Quelle: Bundesverband der Tierärzte 2025</div>
    </div>
  </div>
  <div class="accent" id="accent"></div>
</div>

<script>
  // Parameters — can be overridden via window.setParams({...}) or URL search params
  const params = {
    target: 94,
    suffix: '%',
    line1: 'der Tierärzte empfehlen',
    line2: 'Quelle: Bundesverband der Tierärzte 2025',
  };

  const qs = new URLSearchParams(location.search);
  for (const k of Object.keys(params)) {
    if (qs.has(k)) params[k] = qs.get(k);
  }
  params.target = parseFloat(params.target);

  function applyStatic() {
    document.getElementById('line1').textContent = params.line1;
    document.getElementById('line2').textContent = params.line2;
  }
  applyStatic();

  window.setParams = function(p) {
    Object.assign(params, p);
    params.target = parseFloat(params.target);
    applyStatic();
    if (window.__lastFrame !== undefined) window.seekTo(window.__lastFrame, window.__lastFps);
  };

  const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const lerp = (a, b, t) => a + (b - a) * t;

  // Timeline (seconds):
  // 0.0  bar slides up
  // 0.2  counter starts (1.3s, easeOutCubic)
  // 0.5  line1 fades in (0.4s)
  // 0.8  line2 fades in (0.4s)
  // 1.6  shimmer sweep (0.8s)
  // 1.8  accent line grows (0.6s)
  // 4.5  exit: slides down + fades (0.6s)
  // 6.0  total duration — loop

  window.seekTo = function(frame, fps) {
    window.__lastFrame = frame; window.__lastFps = fps;
    const total = 6.0;
    const t = (frame / fps) % total;

    // Bar in/out
    let barT = 0, barOp = 0;
    if (t < 0.5) {
      const p = clamp(t / 0.5, 0, 1);
      barT = lerp(40, 0, easeOutCubic(p));
      barOp = easeOutCubic(p);
    } else if (t < 4.5) {
      barT = 0; barOp = 1;
    } else if (t < 5.1) {
      const p = clamp((t - 4.5) / 0.6, 0, 1);
      barT = lerp(0, 40, p);
      barOp = 1 - p;
    } else {
      barT = 40; barOp = 0;
    }
    const bar = document.getElementById('bar');
    bar.style.transform = `translateY(${barT}px)`;
    bar.style.opacity = barOp;

    // Counter
    const startT = 0.2, durT = 1.3;
    const p = clamp((t - startT) / durT, 0, 1);
    const val = params.target * easeOutCubic(p);
    const whole = Math.round(val);
    document.getElementById('num').textContent = whole + params.suffix;

    // Line 1 (fade + slide)
    const l1start = 0.5, l1dur = 0.4;
    const l1p = clamp((t - l1start) / l1dur, 0, 1);
    const l1e = easeOutCubic(l1p);
    const l1 = document.getElementById('line1');
    l1.style.opacity = l1e;
    l1.style.transform = `translateX(${lerp(-12, 0, l1e)}px)`;

    // Line 2
    const l2start = 0.8, l2dur = 0.4;
    const l2p = clamp((t - l2start) / l2dur, 0, 1);
    const l2e = easeOutCubic(l2p);
    const l2 = document.getElementById('line2');
    l2.style.opacity = l2e * 0.5;
    l2.style.transform = `translateX(${lerp(-12, 0, l2e)}px)`;

    // Shimmer (sweep across num-box)
    const shStart = 1.6, shDur = 0.8;
    const shP = clamp((t - shStart) / shDur, 0, 1);
    const shimmer = document.getElementById('shimmer');
    // left goes from -40% to 140%
    shimmer.style.left = lerp(-40, 140, shP) + '%';
    shimmer.style.opacity = shP > 0 && shP < 1 ? 1 : 0;

    // Accent line (grows)
    const acStart = 1.8, acDur = 0.6;
    const acP = clamp((t - acStart) / acDur, 0, 1);
    document.getElementById('accent').style.width = (easeOutCubic(acP) * 100) + '%';
  };

  // Default initial frame
  window.seekTo(0, 30);
</script>
</body>
</html>
