<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Testimonial Overlay</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1920px; height: 1080px; overflow: hidden;
    background: #00b140;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    position: fixed; left: 80px; bottom: 100px;
    max-width: 1100px;
    transform: translateY(40px); opacity: 0;
    will-change: transform, opacity;
  }
  .quote-mark {
    font-family: Georgia, serif;
    font-size: 96px; line-height: 1;
    color: #fff;
    opacity: 0;
    transform: translateY(20px);
    margin-bottom: -20px;
  }
  .quote {
    font-size: 40px; font-weight: 500; line-height: 1.3;
    color: #fff; letter-spacing: -0.02em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    padding: 0 8px;
  }
  .quote .w { display: inline-block; opacity: 0; transform: translateY(14px); }
  .attrib {
    margin-top: 28px; padding-left: 8px;
    display: flex; align-items: center; gap: 14px;
    opacity: 0; transform: translateX(-12px);
  }
  .accent-bar {
    width: 4px; height: 40px; background: #fff; border-radius: 2px;
  }
  .name { font-size: 22px; font-weight: 600; color: #fff; }
  .role { font-size: 15px; color: rgba(255,255,255,0.7); margin-top: 2px; }
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="quote-mark" id="qmark">"</div>
  <div class="quote" id="quote"></div>
  <div class="attrib" id="attrib">
    <div class="accent-bar"></div>
    <div>
      <div class="name" id="name">Dr. Maria Schmidt</div>
      <div class="role" id="role">Tierärztin, 12 Jahre Erfahrung</div>
    </div>
  </div>
</div>

<script>
  const params = {
    quote: 'Der Juckreiz ist so gut wie weg. Kein Pfotenlecken mehr. Ihr Fell sieht fantastisch aus.',
    name: 'Dr. Maria Schmidt',
    role: 'Tierärztin, 12 Jahre Erfahrung',
  };
  const qs = new URLSearchParams(location.search);
  for (const k of Object.keys(params)) if (qs.has(k)) params[k] = qs.get(k);

  function build() {
    document.getElementById('name').textContent = params.name;
    document.getElementById('role').textContent = params.role;
    const q = document.getElementById('quote');
    q.innerHTML = '';
    const words = params.quote.split(/(\s+)/);
    words.forEach((w) => {
      if (/^\s+$/.test(w)) {
        q.appendChild(document.createTextNode(w));
      } else {
        const span = document.createElement('span');
        span.className = 'w';
        span.textContent = w;
        q.appendChild(span);
      }
    });
  }
  build();

  window.setParams = function(p) {
    Object.assign(params, p);
    build();
    if (window.__lastFrame !== undefined) window.seekTo(window.__lastFrame, window.__lastFps);
  };

  const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  const lerp = (a, b, t) => a + (b - a) * t;

  window.seekTo = function(frame, fps) {
    window.__lastFrame = frame; window.__lastFps = fps;
    const total = 7.0;
    const t = (frame / fps) % total;

    // Wrap in/out
    let wT = 0, wOp = 0;
    if (t < 0.5) {
      const p = clamp(t / 0.5, 0, 1);
      wT = lerp(40, 0, easeOutCubic(p));
      wOp = easeOutCubic(p);
    } else if (t < 5.5) {
      wT = 0; wOp = 1;
    } else if (t < 6.2) {
      const p = clamp((t - 5.5) / 0.7, 0, 1);
      wT = lerp(0, 40, p);
      wOp = 1 - p;
    } else {
      wT = 40; wOp = 0;
    }
    const wrap = document.getElementById('wrap');
    wrap.style.transform = `translateY(${wT}px)`;
    wrap.style.opacity = wOp;

    // Quote mark
    const qmStart = 0.3, qmDur = 0.4;
    const qmP = clamp((t - qmStart) / qmDur, 0, 1);
    const qmE = easeOutCubic(qmP);
    const qm = document.getElementById('qmark');
    qm.style.opacity = qmE;
    qm.style.transform = `translateY(${lerp(20, 0, qmE)}px)`;

    // Words stagger
    const words = document.querySelectorAll('.w');
    const wordsStart = 0.6;
    const wordStagger = 0.04;
    const wordDur = 0.4;
    words.forEach((el, i) => {
      const wp = clamp((t - wordsStart - i * wordStagger) / wordDur, 0, 1);
      const we = easeOutCubic(wp);
      el.style.opacity = we;
      el.style.transform = `translateY(${lerp(14, 0, we)}px)`;
    });

    // Attribution
    const wordsEndT = wordsStart + words.length * wordStagger + wordDur;
    const atStart = Math.min(wordsEndT, 2.5);
    const atDur = 0.5;
    const atP = clamp((t - atStart) / atDur, 0, 1);
    const atE = easeOutCubic(atP);
    const at = document.getElementById('attrib');
    at.style.opacity = atE;
    at.style.transform = `translateX(${lerp(-12, 0, atE)}px)`;
  };

  window.seekTo(0, 30);
</script>
</body>
</html>
